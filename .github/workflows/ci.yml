name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Run checks
        run: bun run check

      - name: Run build
        run: bun run build

      - name: Apply local D1 migrations (first pass)
        run: bun run db:migrate:local

      - name: Apply local D1 migrations (idempotency pass)
        run: bun run db:migrate:local
